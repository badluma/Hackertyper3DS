name: Publish
on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bannertool
        run: |
          curl -fsSL https://github.com/carstene1ns/3ds-bannertool/releases/download/1.2.3/bannertool-1.2.3-linux.tar.gz -o bannertool.tar.gz
          tar -xzf bannertool.tar.gz --strip-components=1
          mv bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool

      - name: Install makerom
        run: |
          curl -fsSL https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.19.0/makerom-v0.19.0-ubuntu_x86_64.zip -o makerom.zip
          unzip makerom.zip makerom
          mv makerom /usr/local/bin/makerom
          chmod +x /usr/local/bin/makerom

      - name: Clean potential build artifacts
        run: make clean

      - name: Build
        run: make cia

      - name: Check build
        run: |
          shopt -s failglob
          ls *.3dsx *.cia
        working-directory: build/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/*.3dsx
            build/*.cia

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.3dsx
            build/*.cia
          generate_release_notes: true
